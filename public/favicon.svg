  <circle cx="50" cy="50" r="42" fill="none" stroke="#1a1a1c" stroke-width="1.5" />
  <circle cx="50" cy="50" r="36" fill="none" stroke="#1a1a1c" stroke-width="1.5" />
  <circle cx="50" cy="50" r="30" fill="none" stroke="#1a1a1c" stroke-width="1.5" />
